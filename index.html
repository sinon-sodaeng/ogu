<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오구 초간단 프로필</title>

<style>
body{
    margin:0;
    background:#f5f7fb;
    font-family:'Pretendard',sans-serif;
}

.profile{
    width:320px;
    margin:40px auto;
    background:#fff;
    border-radius:24px;
    padding:30px 25px;
    text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.profile img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid #f0f4ff;
}

.name{
    margin-top:18px;
    margin-bottom:24px;
    font-size:30px;
    font-weight:700;
    color:#222;
}

.btn-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link-btn{
    display:block;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    font-weight:700;
    color:white;
    transition:.2s;
}

.link-btn:hover{
    transform:translateY(-2px);
}

.station{
    background:#4f7cff;
}

.cafe{
    background:#22c55e;
}

.legend{
    background:#ff3b30;
}
</style>
</head>
<body>

<div class="profile">

    <img src="ogu.png" alt="오구">

    <div class="name">오구</div>

    <div class="btn-group">

        <a class="link-btn station"
           href="https://www.sooplive.com/station/been11060"
           target="_blank">
            방송국
        </a>

        <a class="link-btn cafe"
           href="https://cafe.naver.com/59warts"
           target="_blank">
            카페
        </a>

        <a class="link-btn legend"
           href="https://vod.sooplive.com/player/197290767/catch"
           target="_blank">
            🚫클릭금지🚫
        </a>

    </div>

</div>

</body>
</html>
